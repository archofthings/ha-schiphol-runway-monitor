<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Schiphol Runway Card Preview</title>
<style>
  body { margin: 0; background: #1a1a2e; display: flex; justify-content: center; padding: 20px; font-family: system-ui; }
</style>
</head>
<body>
<!-- 
  ═══════════════════════════════════════════════════════════════════
  SCHIPHOL RUNWAY MONITOR — Lovelace Dashboard Card
  ═══════════════════════════════════════════════════════════════════
  
  Installation:
  1. Copy this entire file to /config/www/schiphol_runway_card.html
  2. In Lovelace, add a "Manual card" with:
  
      type: custom:html-template-card
      ignore_line_breaks: true
      content: !include /config/www/schiphol_runway_card.html
  
  OR use a standard "Webpage card" with:
      type: iframe
      url: /local/schiphol_runway_card.html
      aspect_ratio: 100%
  
  Entity IDs expected (adjust if your HA names differ):
    sensor.06_24_kaagbaan
    sensor.09_27_oostbaan
    sensor.18c_36c_zwanenburgbaan
    sensor.18l_36r_aalsmeerbaan
    sensor.18r_36l_polderbaan
    sensor.04_22_buitenveldertbaan
    sensor.schiphol_peak_time
    binary_sensor.schiphol_inbound_peak
    binary_sensor.schiphol_outbound_peak
  ═══════════════════════════════════════════════════════════════════
-->
<div id="schiphol-card">
  <div class="card-header">
    <span class="title">✈ Schiphol Runway Status</span>
    <span class="updated" id="updated-time">—</span>
  </div>

  <!-- SVG MAP -->
  <div class="map-container">
    <svg id="runway-map" viewBox="0 0 400 460" xmlns="http://www.w3.org/2000/svg">
      <!-- Background grid (subtle) -->
      <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2a3a" stroke-width="0.5"/>
        </pattern>
        <!-- Glow filter for active runways -->
        <filter id="glow-landing" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="glow-takeoff" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <rect width="400" height="460" fill="#0d1b2a" rx="8"/>
      <rect width="400" height="460" fill="url(#grid)" rx="8"/>

      <!-- 
        Schiphol runway layout (accurate relative positions & bearings):
        
        18R/36L  Polderbaan    — far NW, bearing 183° (N-S), length longest
        18C/36C  Zwanenburgbaan— NW cluster, bearing 183° (N-S)
        18L/36R  Aalsmeerbaan  — SW, bearing 183° (N-S)
        06/24    Kaagbaan      — SW, bearing 058° (NE-SW diagonal)
        04/22    Buitenveldertbaan — SE, bearing 041° (NNE-SSW)
        09/27    Oostbaan      — short E-W, bearing 087°
        
        SVG coordinate system: origin top-left, Y increases downward.
        North = up in our map. Bearing 0° = north = up = negative Y direction.
      -->

      <!-- ─── 18R/36L POLDERBAAN (bearing 183° ≈ N-S, far NW) ─── -->
      <g id="rwy-18R-36L" class="runway-group">
        <line class="runway-line" x1="82" y1="30" x2="78" y2="200"
              stroke="#2a3f55" stroke-width="8" stroke-linecap="round"/>
        <!-- threshold marks -->
        <line class="threshold" x1="76" y1="30" x2="88" y2="30" stroke="#2a3f55" stroke-width="2"/>
        <line class="threshold" x1="72" y1="200" x2="84" y2="200" stroke="#2a3f55" stroke-width="2"/>
        <text class="rwy-label" x="95" y="34" fill="#4a6a85">36L</text>
        <text class="rwy-label" x="95" y="200" fill="#4a6a85">18R</text>
        <text class="rwy-name" x="55" y="115" fill="#2a3f55" transform="rotate(-3 55 115)">Polderbaan</text>
      </g>

      <!-- ─── 18C/36C ZWANENBURGBAAN (bearing 183°, center) ─── -->
      <g id="rwy-18C-36C" class="runway-group">
        <line class="runway-line" x1="148" y1="75" x2="144" y2="245"
              stroke="#2a3f55" stroke-width="8" stroke-linecap="round"/>
        <line class="threshold" x1="142" y1="75" x2="154" y2="75" stroke="#2a3f55" stroke-width="2"/>
        <line class="threshold" x1="138" y1="245" x2="150" y2="245" stroke="#2a3f55" stroke-width="2"/>
        <text class="rwy-label" x="158" y="80" fill="#4a6a85">36C</text>
        <text class="rwy-label" x="158" y="248" fill="#4a6a85">18C</text>
        <text class="rwy-name" x="120" y="162" fill="#2a3f55" transform="rotate(-3 120 162)">Zwanenburgbaan</text>
      </g>

      <!-- ─── 18L/36R AALSMEERBAAN (bearing 183°, SE cluster) ─── -->
      <g id="rwy-18L-36R" class="runway-group">
        <line class="runway-line" x1="250" y1="170" x2="246" y2="360"
              stroke="#2a3f55" stroke-width="8" stroke-linecap="round"/>
        <line class="threshold" x1="244" y1="170" x2="256" y2="170" stroke="#2a3f55" stroke-width="2"/>
        <line class="threshold" x1="240" y1="360" x2="252" y2="360" stroke="#2a3f55" stroke-width="2"/>
        <text class="rwy-label" x="260" y="174" fill="#4a6a85">36R</text>
        <text class="rwy-label" x="260" y="363" fill="#4a6a85">18L</text>
        <text class="rwy-name" x="215" y="270" fill="#2a3f55" transform="rotate(-3 215 270)">Aalsmeerbaan</text>
      </g>

      <!-- ─── 06/24 KAAGBAAN (bearing 058°, NE-SW diagonal) ─── -->
      <g id="rwy-06-24" class="runway-group">
        <!-- bearing 58° from north: dx=sin(58°)=0.848, dy=-cos(58°)=-0.530 -->
        <!-- center ~(195,330), length ~170px -->
        <line class="runway-line" x1="123" y1="375" x2="267" y2="285"
              stroke="#2a3f55" stroke-width="8" stroke-linecap="round"/>
        <line class="threshold" x1="116" y1="380" x2="130" y2="370" stroke="#2a3f55" stroke-width="2"/>
        <line class="threshold" x1="260" y1="290" x2="274" y2="280" stroke="#2a3f55" stroke-width="2"/>
        <text class="rwy-label" x="100" y="388" fill="#4a6a85">24</text>
        <text class="rwy-label" x="270" y="278" fill="#4a6a85">06</text>
        <text class="rwy-name" x="160" y="354" fill="#2a3f55" transform="rotate(-32 160 354)">Kaagbaan</text>
      </g>

      <!-- ─── 04/22 BUITENVELDERTBAAN (bearing 041°, NNE-SSW) ─── -->
      <g id="rwy-04-22" class="runway-group">
        <!-- bearing 41°: dx=sin(41°)=0.656, dy=-cos(41°)=-0.755 -->
        <!-- short runway, center ~(330,310) -->
        <line class="runway-line" x1="296" y1="375" x2="360" y2="243"
              stroke="#2a3f55" stroke-width="6" stroke-linecap="round"/>
        <line class="threshold" x1="289" y1="378" x2="303" y2="372" stroke="#2a3f55" stroke-width="2"/>
        <line class="threshold" x1="353" y1="246" x2="367" y2="240" stroke="#2a3f55" stroke-width="2"/>
        <text class="rwy-label" x="270" y="390" fill="#4a6a85">22</text>
        <text class="rwy-label" x="362" y="238" fill="#4a6a85">04</text>
        <text class="rwy-name" x="330" y="330" fill="#2a3f55" transform="rotate(-49 330 330)">Buitenveldertbaan</text>
      </g>

      <!-- ─── 09/27 OOSTBAAN (bearing 087° ≈ E-W, short) ─── -->
      <g id="rwy-09-27" class="runway-group">
        <line class="runway-line" x1="180" y1="420" x2="310" y2="418"
              stroke="#2a3f55" stroke-width="5" stroke-linecap="round"/>
        <line class="threshold" x1="180" y1="414" x2="180" y2="424" stroke="#2a3f55" stroke-width="2"/>
        <line class="threshold" x1="310" y1="412" x2="310" y2="426" stroke="#2a3f55" stroke-width="2"/>
        <text class="rwy-label" x="158" y="423" fill="#4a6a85">27</text>
        <text class="rwy-label" x="314" y="423" fill="#4a6a85">09</text>
        <text class="rwy-name" x="220" y="414" fill="#2a3f55">Oostbaan</text>
      </g>

      <!-- Compass rose -->
      <g transform="translate(30,430)">
        <circle r="14" fill="#0d1b2a" stroke="#1e3a5a" stroke-width="1"/>
        <text x="0" y="-6" text-anchor="middle" font-size="8" fill="#4a7a9b" font-weight="bold">N</text>
        <line x1="0" y1="-12" x2="0" y2="-4" stroke="#4a7a9b" stroke-width="1.5"/>
        <line x1="0" y1="4" x2="0" y2="12" stroke="#2a4a6a" stroke-width="1"/>
        <line x1="-12" y1="0" x2="-4" y2="0" stroke="#2a4a6a" stroke-width="1"/>
        <line x1="4" y1="0" x2="12" y2="0" stroke="#2a4a6a" stroke-width="1"/>
      </g>
    </svg>
  </div>

  <!-- LEGEND / STATUS PANEL -->
  <div class="status-panel">
    <div class="runway-status-grid" id="runway-grid">
      <!-- Populated by JS -->
    </div>

    <div class="peak-row" id="peak-row">
      <div class="peak-badge" id="peak-inbound">
        <span class="peak-icon">↓</span>
        <span class="peak-label">Inbound peak</span>
        <span class="peak-state" id="inbound-state">—</span>
      </div>
      <div class="peak-badge" id="peak-outbound">
        <span class="peak-icon">↑</span>
        <span class="peak-label">Outbound peak</span>
        <span class="peak-state" id="outbound-state">—</span>
      </div>
    </div>
  </div>
</div>

<style>
  /* ── Card shell ─────────────────────────────────────────────── */
  #schiphol-card {
    background: linear-gradient(160deg, #0d1b2a 0%, #0a1520 100%);
    border: 1px solid #1e3a5a;
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    color: #c8d8e8;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px 8px;
    border-bottom: 1px solid #1e3a5a;
  }
  .title { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; color: #e0eaf4; }
  .updated { font-size: 10px; color: #4a7a9b; font-variant-numeric: tabular-nums; }

  /* ── SVG map ─────────────────────────────────────────────────── */
  .map-container { padding: 8px 8px 0; }
  #runway-map { width: 100%; height: auto; display: block; }

  .runway-line { transition: stroke 0.4s, filter 0.4s; }
  .rwy-label   { font-size: 9px; font-weight: 700; font-family: monospace; }
  .rwy-name    { font-size: 7px; writing-mode: horizontal-tb; }

  /* ── Status panel ────────────────────────────────────────────── */
  .status-panel { padding: 8px 12px 12px; }

  .runway-status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 5px;
    margin-bottom: 8px;
  }

  .rwy-chip {
    background: #0d2035;
    border: 1px solid #1a3050;
    border-radius: 6px;
    padding: 5px 6px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: background 0.4s, border-color 0.4s;
  }
  .rwy-chip.inbound {
    background: #0a2a1a;
    border-color: #1a6640;
  }
  .rwy-chip.outbound {
    background: #1a2000;
    border-color: #4a5a00;
  }
  .rwy-chip.inbound_and_outbound {
    background: #1a1a00;
    border-color: #6a6a00;
  }
  .chip-designator { font-size: 11px; font-weight: 700; font-family: monospace; color: #a0b8cc; }
  .chip-name       { font-size: 8px; color: #4a7a9b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chip-state      { font-size: 8px; font-weight: 600; color: #2a5a40; }
  .rwy-chip.inbound      .chip-state { color: #40c870; }
  .rwy-chip.outbound     .chip-state { color: #c8c030; }
  .rwy-chip.inbound_and_outbound .chip-state { color: #c89030; }
  .chip-heading    { font-size: 8px; color: #3a6a90; font-family: monospace; }
  .rwy-chip.inbound .chip-heading { color: #30a060; }
  .rwy-chip.outbound .chip-heading { color: #a0a020; }
  .rwy-chip.inbound_and_outbound .chip-heading { color: #a07020; }

  /* ── Peak badges ─────────────────────────────────────────────── */
  .peak-row {
    display: flex;
    gap: 6px;
    margin-top: 6px;
  }
  .peak-badge {
    flex: 1;
    background: #0d2035;
    border: 1px solid #1a3050;
    border-radius: 6px;
    padding: 6px 8px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.4s, border-color 0.4s;
  }
  .peak-badge.active-inbound  { background: #0a2a1a; border-color: #1a6640; }
  .peak-badge.active-outbound { background: #1a2000; border-color: #4a5a00; }
  .peak-icon  { font-size: 14px; }
  .peak-label { font-size: 9px; color: #4a7a9b; flex: 1; }
  .peak-state { font-size: 9px; font-weight: 700; color: #2a5a40; font-variant-numeric: tabular-nums; }
  .peak-badge.active-inbound  .peak-state { color: #40c870; }
  .peak-badge.active-outbound .peak-state { color: #c8c030; }
</style>

<script>
// ── Configuration ───────────────────────────────────────────────
const RUNWAYS = [
  { id: "06-24",   designator: "06/24",   name: "Kaagbaan",         svgId: "rwy-06-24",   shortName: "Kaagbaan" },
  { id: "09-27",   designator: "09/27",   name: "Oostbaan",         svgId: "rwy-09-27",   shortName: "Oostbaan" },
  { id: "18c-36c", designator: "18C/36C", name: "Zwanenburgbaan",   svgId: "rwy-18C-36C", shortName: "Zwanenburgb." },
  { id: "18l-36r", designator: "18L/36R", name: "Aalsmeerbaan",     svgId: "rwy-18L-36R", shortName: "Aalsmeerbaan" },
  { id: "18r-36l", designator: "18R/36L", name: "Polderbaan",       svgId: "rwy-18R-36L", shortName: "Polderbaan" },
  { id: "04-22",   designator: "04/22",   name: "Buitenveldertbaan",svgId: "rwy-04-22",   shortName: "Buitenveld." },
];

// Entity ID builders — adjust prefix if your HA generates different IDs
function entityId(designator) {
  return "sensor." + designator
    .replace("/", "_")
    .replace("C","c")
    .replace("L","l")
    .replace("R","r")
    .toLowerCase()
    + "_" + RUNWAYS.find(r => r.designator === designator).name.toLowerCase();
}

// Colors per state
const SVG_COLORS = {
  not_in_use:            "#2a3f55",
  inbound:               "#1a7a40",
  outbound:              "#7a7a00",
  inbound_and_outbound:  "#a07000",
};
const SVG_GLOW = {
  not_in_use:            "none",
  inbound:               "drop-shadow(0 0 6px #20c060)",
  outbound:              "drop-shadow(0 0 6px #c0c000)",
  inbound_and_outbound:  "drop-shadow(0 0 6px #d08000)",
};

// ── State management ────────────────────────────────────────────
let currentState = {};

function getHassStates() {
  // When running inside HA (html-template-card or custom card),
  // hass.states is available globally. In iframe mode, use postMessage.
  if (typeof hass !== "undefined" && hass.states) return hass.states;
  // Fallback: mock states for preview
  return null;
}

function formatState(state) {
  if (!state || state === "not_in_use") return "—";
  return state.replace(/_/g, " ");
}

function getHeadingLabel(attrs, state) {
  if (state === "inbound")              return attrs.landing_heading || "";
  if (state === "outbound")             return attrs.takeoff_heading || "";
  if (state === "inbound_and_outbound") return [attrs.landing_heading, attrs.takeoff_heading].filter(Boolean).join("/");
  return "";
}

// ── DOM builders ────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById("runway-grid");
  grid.innerHTML = "";
  RUNWAYS.forEach(rwy => {
    const chip = document.createElement("div");
    chip.className = "rwy-chip";
    chip.id = "chip-" + rwy.id;
    chip.innerHTML = `
      <div class="chip-designator">${rwy.designator}</div>
      <div class="chip-name">${rwy.shortName}</div>
      <div class="chip-state" id="chipstate-${rwy.id}">—</div>
      <div class="chip-heading" id="chiphdg-${rwy.id}"></div>
    `;
    grid.appendChild(chip);
  });
}

// ── Update from HA states ───────────────────────────────────────
function update(states) {
  const now = new Date().toLocaleTimeString("nl-NL", {hour:"2-digit", minute:"2-digit"});
  document.getElementById("updated-time").textContent = "Updated " + now;

  RUNWAYS.forEach(rwy => {
    // Try both naming conventions HA might generate
    const candidates = [
      "sensor." + rwy.designator.toLowerCase().replace(/\//g,"_").replace(/c$/,"c") + "_" + rwy.name.toLowerCase(),
      "sensor." + rwy.designator.toLowerCase().replace(/\//g,"_") + "_" + rwy.name.toLowerCase(),
    ];
    let entityState = null;
    for (const eid of candidates) {
      if (states && states[eid]) { entityState = states[eid]; break; }
    }

    const state = entityState?.state || "not_in_use";
    const attrs = entityState?.attributes || {};

    // SVG runway coloring
    const svgGroup = document.getElementById(rwy.svgId);
    if (svgGroup) {
      const line = svgGroup.querySelector(".runway-line");
      if (line) {
        line.setAttribute("stroke", SVG_COLORS[state] || SVG_COLORS.not_in_use);
        line.style.filter = SVG_GLOW[state] || "none";
        line.setAttribute("stroke-width", state === "not_in_use" ? "8" : "10");
      }
      // Update label colors
      svgGroup.querySelectorAll(".rwy-label").forEach(el => {
        el.setAttribute("fill", state === "not_in_use" ? "#3a5a75" : "#e0eaf4");
      });
      svgGroup.querySelectorAll(".rwy-name").forEach(el => {
        el.setAttribute("fill", state === "not_in_use" ? "#1e3a55" : "#4a8ab0");
      });
    }

    // Status chip
    const chip = document.getElementById("chip-" + rwy.id);
    if (chip) {
      chip.className = "rwy-chip " + state;
      document.getElementById("chipstate-" + rwy.id).textContent = formatState(state);
      const hdg = getHeadingLabel(attrs, state);
      const hdgEl = document.getElementById("chiphdg-" + rwy.id);
      hdgEl.textContent = hdg ? "HDG " + hdg : "";
    }
  });

  // Peak sensors
  const inboundEntity  = states?.["binary_sensor.schiphol_inbound_peak"];
  const outboundEntity = states?.["binary_sensor.schiphol_outbound_peak"];
  const peakEntity     = states?.["sensor.schiphol_peak_time"];

  const inboundOn  = inboundEntity?.state  === "on";
  const outboundOn = outboundEntity?.state === "on";

  const inboundBadge  = document.getElementById("peak-inbound");
  const outboundBadge = document.getElementById("peak-outbound");
  const inboundStateEl  = document.getElementById("inbound-state");
  const outboundStateEl = document.getElementById("outbound-state");

  inboundBadge.className  = "peak-badge" + (inboundOn  ? " active-inbound"  : "");
  outboundBadge.className = "peak-badge" + (outboundOn ? " active-outbound" : "");

  if (inboundOn) {
    inboundStateEl.textContent = "ACTIVE";
  } else {
    const next = inboundEntity?.attributes?.next_inbound_peak || peakEntity?.attributes?.next_inbound_peak;
    inboundStateEl.textContent = next ? "next " + next : "off";
  }
  if (outboundOn) {
    outboundStateEl.textContent = "ACTIVE";
  } else {
    const next = outboundEntity?.attributes?.next_outbound_peak || peakEntity?.attributes?.next_outbound_peak;
    outboundStateEl.textContent = next ? "next " + next : "off";
  }
}

// ── HA integration wiring ───────────────────────────────────────
function connectToHA() {
  // html-template-card / custom-card: hass object is injected
  if (typeof hass !== "undefined") {
    update(hass.states);
    // Poll for changes (simple approach that works in all card types)
    setInterval(() => {
      if (typeof hass !== "undefined") update(hass.states);
    }, 5000);
    return;
  }

  // iframe mode: use WebSocket API
  const wsProto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${wsProto}://${location.host}/api/websocket`);
  let msgId = 1;
  let token = null;

  ws.onmessage = (ev) => {
    const msg = JSON.parse(ev.data);
    if (msg.type === "auth_required") {
      // Get token from URL param ?token=xxx or localStorage
      token = new URLSearchParams(location.search).get("token") ||
              localStorage.getItem("hassTokens") && JSON.parse(localStorage.getItem("hassTokens"))?.access_token;
      if (token) ws.send(JSON.stringify({ type: "auth", access_token: token }));
    } else if (msg.type === "auth_ok") {
      ws.send(JSON.stringify({ id: msgId++, type: "get_states" }));
      ws.send(JSON.stringify({ id: msgId++, type: "subscribe_events", event_type: "state_changed" }));
    } else if (msg.type === "result" && msg.result) {
      const stateMap = {};
      msg.result.forEach(s => stateMap[s.entity_id] = s);
      update(stateMap);
    } else if (msg.type === "event" && msg.event?.event_type === "state_changed") {
      // Lightweight: re-fetch all states on any change
      ws.send(JSON.stringify({ id: msgId++, type: "get_states" }));
    }
  };
}

// ── Init ────────────────────────────────────────────────────────
buildGrid();
connectToHA();
</script>
</html>
